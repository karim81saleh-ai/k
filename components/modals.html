<div class="sheet-overlay" id="addSheet" onclick="closeSheetOnOverlay(event,'addSheet')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="addSheetTitle">✦ إضافة محفوظة</div>
    <div class="form-group">
      <label class="form-label">السورة / الجزء</label>
      <input class="form-input" id="f_content" type="text" placeholder="مثال: البقرة...">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">الصفحات</label><input class="form-input" id="f_pages" type="number" step="0.5">
      </div>
      <div class="form-group">
        <label class="form-label">البداية</label><input class="form-input" id="f_date" type="date">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">الخطة</label>
      <select id="f_plan" class="form-input" onchange="togglePlanFields()">
        <option value="default">افتراضية (7-10-17-30)</option>
        <option value="repeating">دورية (تكرار مستمر)</option>
        <option value="custom">مخصصة (أيام محددة)</option>
      </select>
    </div>
    <div class="form-group" id="repeatingFields" style="display:none;">
      <label class="form-label">تكرار كل (أيام)</label>
      <input class="form-input" id="f_interval" type="number" value="15">
    </div>
    <div class="form-group" id="customFields" style="display:none;">
      <label class="form-label">أيام المراجعة (مفصولة بفاصلة)</label>
      <input class="form-input" id="f_custom" type="text" placeholder="مثال: 1,3,7,14,30">
    </div>
    <div class="form-group">
      <label class="form-label">ملاحظات (Rich Text)</label>
      <div class="note-toolbar">
        <button type="button" onclick="document.execCommand('bold',false,null)"><i class="fas fa-bold"></i></button>
        <button type="button" onclick="document.execCommand('foreColor',false,'#2c5f8a')" style="color:#2c5f8a"><i class="fas fa-square"></i></button>
        <button type="button" onclick="document.execCommand('foreColor',false,'#7a3a2a')" style="color:#7a3a2a"><i class="fas fa-square"></i></button>
        <button type="button" onclick="document.execCommand('foreColor',false,'#1a7f37')" style="color:#1a7f37"><i class="fas fa-square"></i></button>
      </div>
      <div id="f_note" contenteditable="true" class="form-input note-editor"></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeSheet('addSheet')">إلغاء</button>
      <button class="btn btn-primary" onclick="saveItem()">حفظ</button>
    </div>
  </div>
</div>

<div class="sheet-overlay" id="importSheet" onclick="closeSheetOnOverlay(event,'importSheet')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">📥 استيراد نسخة احتياطية</div>
    <input type="file" class="form-input" id="importFile" accept=".json">
    <div class="form-actions" style="margin-top:15px">
      <button class="btn btn-ghost" onclick="closeSheet('importSheet')">إلغاء</button>
      <button class="btn btn-primary" onclick="importData()">استيراد البيانات</button>
    </div>
  </div>
</div>
